name = "ai-smartwatch"
compatibility_date = "2024-01-02"
pages_build_output_dir = "dist"

# Cloudflare Workers AI is invoked via REST API using:
#   - CF_ACCOUNT_ID (Account ID from Cloudflare dashboard)
#   - CF_API_TOKEN (API token with "Workers AI: Read" permission)
# Set these in: Settings → Environment variables (Production + Preview)

# KV namespace binding — create via Cloudflare Dashboard:
#   Workers & Pages → ai-smartwatch → Settings → Functions → KV namespace bindings
#   Variable name: CART_KV  |  KV namespace: <your-namespace-id>
# [[kv_namespaces]]
# binding = "CART_KV"
# id = "REPLACE_WITH_YOUR_KV_ID"